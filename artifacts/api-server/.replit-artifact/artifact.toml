kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "sh -c \"cd ../../ && DATABASE_URL=$DATABASE_URL ./backend/bin/api\""

[services.production]

[services.production.build]
args = ["sh", "-c", "cd ../../backend && go build -o bin/api ./cmd/api/main.go"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["sh", "-c", "cd ../../ && ./backend/bin/api"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/health"
