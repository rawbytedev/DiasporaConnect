kind = "api"
  previewPath = "/api"
  title = "API Server"
  version = "1.0.0"
  id = "3B4_FFSkEVBkAeYMFRJ2e"

  [[services]]
  localPort = 8080
  name = "API Server"
  paths = ["/api"]

  [services.development]
  run = "sh -c \"DATABASE_URL=$DATABASE_URL /home/runner/workspace/backend/bin/api\""

  [services.production]

  [services.production.build]
  args = ["sh", "-c", "cd /home/runner/workspace/backend && go build -buildvcs=false -o bin/api ./cmd/api/"]

  [services.production.build.env]
  NODE_ENV = "production"

  [services.production.run]
  args = ["/home/runner/workspace/backend/bin/api"]

  [services.production.run.env]
  PORT = "8080"
  NODE_ENV = "production"

  [services.production.health.startup]
  path = "/api/health"
  