kind = "web"
previewPath = "/"
title = "DiasporaConnect — Site Vitrine"
version = "1.0.0"
id = "artifacts/diaspora-connect-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23479

[services.development]
run = "pnpm --filter @workspace/diaspora-connect-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/diaspora-connect-site", "run", "build" ]
publicDir = "artifacts/diaspora-connect-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23479"
BASE_PATH = "/"
