<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recevoir - Bénin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #F3F4F6; }
        .card-header { background: #16A34A; color: white; font-size: 1.5rem; }
        .solde { font-size: 2.5rem; font-weight: bold; color: #16A34A; }
        .card-body { font-size: 1.5rem;}
        p { font-size: 1.8rem; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 450px;">
        <div class="card mt-4 shadow">
            <div class="card-header text-center">
                <h3><i class="bi bi-phone"></i>BéninConnect</h3>
            </div>
            <div class="card-body p-4 text-center">
                <p class="text-muted mb-1">Voir les fonds</p>
                <div class="solde">64,600 CFA</div>
                <p class="text-muted">∼98.50 USDC reçus</p>

                <div class="alert alert-success text-start mt-3">
                    <strong><i class="bi bi-check-circle"></i>Transfert reçu</strong><br>
                    De: Tante Marie, France <br>
                    Date: 15 Avril 2026 <br>
                    Frais payés: 1.5% seulement
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button class="btn btn-success btn-lg" onclick="retirer()">
                        <i class="bi bi-cash-coin"></i> Retirer sur Mobile Money
                    </button>
                    <button class="btn btn-outline-secondary">
                        <i class="bi bi-clock-history"></i> Historique des transferts
                    </button>
                </div>
                <div class="alert alert-info mt-4 text-start small">
                    <strong>Economie réalisée:</strong><br>
                    Vs Western Union: <span class="text-success fw-bold">+8,500 CFA</span> économisés sur ce transfert
                </div>
            </div>
        </div>
    </div>

    <script scr="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
    <script>
        const ADRESSE_CONTRAT = "COLLE_ICI_L_ADRESSE_DE_TON_CONTRAT";
        const ABI_CONTRAT = [
            "function getTransfertsDestinataire(string memory _numero) external view returns (tuple(adress expediteur, string numeroMobileMoney, uint256 montantEnvoye, uint256 montantNet, uint256 timestamp, bool retire)[] memory)"
        ];
        const BACKEND_URL = "http://localhost:3000/retirer"; // Ton backend Node

        const provider = new ethers.JsonRpcProvider("https://rpc-mumbai.maticvigil.com");
        const contrat = new ethers.Contract(ADRESSE_CONTRAT, ABI_CONTRAT, provider);

        let dernierTransfertId = null;
        let montantNetUSDC = 0;
        const numeroBenin = "+22997123456"; // En dur pour la démo. En vrai = login user.

        async function chargerFonds() {
            const transferts = await contrat.getTransfertsDestinataire(numeroBenin);
            const transfertsNonRetires = transferts.filter(t => !t.retire);

            if (transfertsNonRetires.length > 0) {
                const dernier = transfertsNonRetires[transfertsNonRetires.length - 1];
                montantNetUSDC = Number(ethers.formatUnits(dernier.montantNet, 6));
                const montantCFA = (montantNetUSDC * 655.96).toFixed(0);

                document.querySelector('.solde').textContent = new Intl.NumberFormat('fr-FR').format(montantCFA) + ' CFA';
                document.querySelector('text-muted').nextElementSibling.textContent = `∼${montantNetUSDC} USDC reçus`;
                dernierTransfertId = dernier; // On garde l'objet pour le retrait
            }
        }

        async function retirer() {
            if (!dernierTransfertId) return alert('Aucun fond à retirer');

            // Appel au backend qui va faire l'API MTN puis marquerCommeRetire sur le contrat
            const res = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    numero: numeroBenin,
                    montantCFA: (montantNetUSDC * 655.96).toFixed(0)
                })
            });
            const data = await res.json();
            alert(data.message);
            chargerFonds(); // Refresh le solde
        }

        window.onload = chargerFonds;
    </script>
</body>
</html>
